<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Stock<span>Hub</span></h1>
            <div id="connection-status" class="status-online">online</div>
        </header>

        <main>
            <div id="auth-screen" class="auth-card">
                <div class="tabs">
                    <button id="tab-login" class="active" onclick="switchTab('login')">Вход</button>
                    <button id="tab-register" onclick="switchTab('register')">Регистрация</button>
                </div>

                <form id="form-login" class="auth-form" onsubmit="onLogin(event)">
                    <input type="email" id="login-email" placeholder="Электронная почта" required>
                    <input type="password" id="login-password" placeholder="Пароль" required>
                    <button type="submit" class="btn-primary">Войти в аккаунт</button>
                </form>

                <form id="form-register" class="auth-form hidden" onsubmit="onRegister(event)">
                    <input type="text" id="reg-name" placeholder="Имя пользователя" required>
                    <input type="email" id="reg-email" placeholder="Электронная почта" required>
                    <input type="password" id="reg-password" placeholder="Пароль (мин. 8 символов)" required>
                    <button type="submit" class="btn-primary">Создать аккаунт</button>
                </form>
            </div>

            <div id="main-screen" class="hidden">
                <!-- nav  -->
                <nav class="app-nav">
                    <div class="nav-links">
                        <button class="nav-btn active" onclick="showAppTab('market')">Рынок</button>
                        <button class="nav-btn" onclick="showAppTab('wallet')">Кошелек</button>
                    </div>
                    <div class="user-controls">
                        <span id="user-name-display"></span>
                        <button onclick="logout()" class="btn-logout">Выйти</button>
                    </div>
                </nav>

                <div id="app-content">
                    
                    <!-- Вкладка 1: market -->
                    <section id="pane-market" class="tab-pane">
                        <div class="section-header">
                            <h3>Рынок сегодня</h3>
                            <small id="update-status"></small> 
                        </div>
                        <div id="trends-grid" class="trends-grid">
                            <div class="loader">Загрузка котировок...</div>
                        </div>
                    </section>

                    <!-- Вкладка 2: wallet -->
                    <section id="pane-wallet" class="tab-pane hidden">
                        <!-- 1. Заголовок и общая статистика -->
                        <div class="wallet-header">
                            <div class="balance-card">
                                <h3>Ваш баланс: <span id="user-balance">0.00</span> $</h3>
                                <p class="commission-stats">
                                    Выплачено комиссий: <span id="user-commissions">0.00</span> $
                                </p>
                            </div>
                        </div>

                        <!-- 2. Секция активных инвестиций (те самые карточки-блоки) -->
                        <div class="assets-section">
                            <div class="assets-section">
                                <h4>Мои активы</h4>
                                <div id="portfolio-list" class="portfolio-grid">
                                    <!-- Сюда JS вставит карточки -->
                                </div>
                            </div>
                        </div>

                        <!-- 3. Управление деньгами -->
                        <div class="wallet-actions-grid">
                            <div class="topup-section">
                                <h4>Пополнение счета</h4>
                                <div class="input-group">
                                    <input type="number" id="topup-amount" placeholder="Сумма (max 10 000)">
                                    <button onclick="handleTopUp()" class="btn-primary">Пополнить</button>
                                </div>
                            </div>

                            <!-- 4. История последних операций -->
                            <div class="history-section">
                                <h4>История транзакций</h4>
                                <div id="transaction-history" class="history-list">
                                    <!-- Сюда JS отрисует список -->
                                </div>
                            </div>
                        </div>

                        <!-- Модальное окно (остается скрытым до клика на карточку) -->
                        <div id="asset-modal" class="modal hidden">
                            <div class="modal-content">
                                <span class="close-modal" onclick="closeModal()">&times;</span>
                                <div id="modal-details">
                                    <!-- Здесь будет выплывающая аналитика и графики -->
                                </div>
                            </div>
                        </div>
                    </section>

                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
