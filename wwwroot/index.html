<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Stock<span>Hub</span></h1>
            <div id="connection-status" class="status-online">online</div>
        </header>

        <main>
            <!-- Секция авторизации -->
            <div id="auth-screen" class="auth-card">
                <div class="tabs">
                    <button id="tab-login" class="active" onclick="switchTab('login')">Вход</button>
                    <button id="tab-register" onclick="switchTab('register')">Регистрация</button>
                </div>

                <form id="form-login" class="auth-form" onsubmit="onLogin(event)">
                    <input type="email" id="login-email" placeholder="Электронная почта" required>
                    <input type="password" id="login-password" placeholder="Пароль" required>
                    <button type="submit" class="btn-primary">Войти в аккаунт</button>
                </form>

                <form id="form-register" class="auth-form hidden" onsubmit="onRegister(event)">
                    <input type="text" id="reg-name" placeholder="Имя пользователя" required>
                    <input type="email" id="reg-email" placeholder="Электронная почта" required>
                    <input type="password" id="reg-password" placeholder="Пароль (мин. 8 символов)" required>
                    <button type="submit" class="btn-primary">Создать аккаунт</button>
                </form>
            </div>

            <!-- Секция приложения (ТЕПЕРЬ СНАРУЖИ) -->
            <div id="main-screen" class="hidden">
                <div class="user-greeting">
                    <h2>Добро пожаловать, <span id="user-name-display"></span>!</h2>
                    <button onclick="logout()" class="btn-logout">Выйти</button>
                </div>

                <section class="trends-section">
                    <h3>Рынок сегодня</h3>
                    <div id="trends-grid" class="trends-grid">
                        <div class="loader">Загрузка котировок...</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
